<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คำถามที่พบบ่อย — Toyota Motor Thailand</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #EB0A1E;
    --red-dark: #b8001a;
    --white: #ffffff;
    --gray-50: #f9f9f9;
    --gray-100: #f0f0f0;
    --gray-200: #e0e0e0;
    --gray-400: #999;
    --gray-600: #555;
    --gray-800: #222;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--gray-50);
    color: var(--gray-800);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  header {
    background: var(--red);
    color: white;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  .header-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-circle {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 22px;
    font-weight: 600;
    color: white;
    font-family: Georgia, serif;
  }

  .header-text h1 { font-size: 17px; font-weight: 600; }
  .header-text p { font-size: 12px; opacity: 0.85; font-weight: 300; }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  .search-box {
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    margin-bottom: 28px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .search-box svg { color: var(--gray-400); flex-shrink: 0; }

  .search-box input {
    border: none;
    outline: none;
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    width: 100%;
    background: transparent;
    color: var(--gray-800);
  }

  .search-box input::placeholder { color: var(--gray-400); }

  .section { margin-bottom: 8px; }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray-400);
    padding: 20px 4px 8px;
  }

  .faq-item {
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    margin-bottom: 4px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .faq-item.active { border-color: var(--red); }

  .faq-question {
    width: 100%;
    background: none;
    border: none;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    text-align: left;
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    color: var(--gray-800);
    line-height: 1.6;
    transition: background 0.15s;
  }

  .faq-question:hover { background: var(--gray-50); }

  .faq-num {
    font-size: 11px;
    font-weight: 600;
    color: var(--red);
    min-width: 22px;
    margin-top: 3px;
    flex-shrink: 0;
  }

  .faq-q-text { flex: 1; font-weight: 400; }

  .faq-chevron {
    flex-shrink: 0;
    margin-top: 4px;
    transition: transform 0.25s ease;
    color: var(--gray-400);
  }

  .faq-item.active .faq-chevron {
    transform: rotate(180deg);
    color: var(--red);
  }

  .faq-answer {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .faq-answer-inner {
    padding: 0 16px 16px 50px;
    border-top: 1px solid var(--gray-100);
    padding-top: 14px;
  }

  .answer-text {
    font-size: 14px;
    color: var(--gray-600);
    line-height: 1.8;
    white-space: pre-wrap;
  }

  .no-answer {
    font-size: 13px;
    color: var(--gray-400);
    font-style: italic;
  }

  .loading-state {
    text-align: center;
    padding: 60px 0;
    color: var(--gray-400);
    font-size: 14px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--gray-200);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    text-align: center;
    padding: 40px;
    background: white;
    border-radius: var(--radius-lg);
    border: 1px solid var(--gray-200);
    color: var(--gray-600);
    font-size: 14px;
  }

  .no-result {
    text-align: center;
    padding: 40px;
    color: var(--gray-400);
    font-size: 14px;
  }

  .count-badge {
    display: inline-block;
    background: var(--red);
    color: white;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: 8px;
    vertical-align: middle;
  }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--gray-400);
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-circle">?</div>
    <div class="header-text">
      <h1>คำถามที่พบบ่อย</h1>
      <p>Toyota Motor Thailand — สำหรับนักศึกษาและผู้เยี่ยมชมโรงงาน</p>
    </div>
  </div>
</header>

<div class="container">
  <div class="search-box">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="ค้นหาคำถาม..." oninput="filterFAQ()" />
  </div>

  <div id="faqContainer">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>กำลังโหลดข้อมูล...</p>
    </div>
  </div>
</div>

<footer>Toyota Motor Thailand Co., Ltd.</footer>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vScgL3O0EmO1XjCTZ0WqQg55Q6Q3_LkcV1kDwYXCXgpeI39uEdebgtvpptD2UQ5QhUcry4tHKz0Ljyg/pub?gid=1346761017&single=true&output=csv";

let allData = [];

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map((line, idx) => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    const obj = { id: idx + 1 };
    headers.forEach((h, i) => obj[h] = (cols[i] || '').replace(/^"|"$/g, ''));
    return obj;
  }).filter(r => r.question);
}

function groupByCategory(data) {
  const map = {};
  data.forEach(row => {
    const cat = row.category || 'อื่นๆ';
    if (!map[cat]) map[cat] = [];
    map[cat].push(row);
  });
  return map;
}

function renderFAQ(data) {
  const container = document.getElementById('faqContainer');
  if (!data.length) {
    container.innerHTML = '<div class="no-result">ไม่พบคำถามที่ตรงกัน</div>';
    return;
  }
  const grouped = groupByCategory(data);
  let html = '';
  Object.keys(grouped).forEach(cat => {
    html += `<div class="section">
      <div class="section-title">${cat}<span class="count-badge">${grouped[cat].length}</span></div>`;
    grouped[cat].forEach(row => {
      const hasAnswer = row.answer && row.answer.trim().length > 0;
      html += `
      <div class="faq-item" id="item-${row.id}">
        <button class="faq-question" onclick="toggle('${row.id}')" aria-expanded="false">
          <span class="faq-q-text">${row.question}</span>
          <svg class="faq-chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="faq-answer" id="ans-${row.id}">
          <div class="faq-answer-inner">
            ${hasAnswer
              ? `<p class="answer-text">${row.answer}</p>`
              : `<p class="no-answer">ยังไม่มีคำตอบ</p>`
            }
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function toggle(id) {
  const item = document.getElementById('item-' + id);
  const ans = document.getElementById('ans-' + id);
  const btn = item.querySelector('.faq-question');
  const isOpen = item.classList.contains('active');
  if (isOpen) {
    item.classList.remove('active');
    ans.style.maxHeight = '0';
    btn.setAttribute('aria-expanded', 'false');
  } else {
    item.classList.add('active');
    ans.style.maxHeight = ans.scrollHeight + 'px';
    btn.setAttribute('aria-expanded', 'true');
  }
}

function filterFAQ() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (!q) { renderFAQ(allData); return; }
  renderFAQ(allData.filter(r =>
    r.question.toLowerCase().includes(q) ||
    (r.category || '').toLowerCase().includes(q) ||
    (r.answer || '').toLowerCase().includes(q)
  ));
}

async function loadData() {
  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error('Network error');
    const text = await res.text();
    allData = parseCSV(text);
    renderFAQ(allData);
  } catch (e) {
    document.getElementById('faqContainer').innerHTML = `
      <div class="error-state">
        <p>ไม่สามารถโหลดข้อมูลได้ในขณะนี้</p>
        <p style="margin-top:8px; font-size:12px; color:#aaa;">กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต หรือติดต่อผู้ดูแลระบบ</p>
      </div>`;
  }
}

loadData();
</script>
</body>
</html>
